<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Control - Flota</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #mapa { width: 100vw; height: 100vh; }
        
        /* Diseño del popup sobre el vehículo */
        .info-vehiculo { font-size: 14px; }
        .info-vehiculo strong { color: #d32f2f; }
        
        /* Diseño del marcador estático con la placa */
        .etiqueta-placa {
            background-color: #1a237e;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            border: 1px solid white;
        }
    </style>
</head>
<body>

    <div id="mapa"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        // ⚠️ ATENCIÓN: Debes reemplazar esto con tus llaves reales
        const firebaseConfig = {
          apiKey: "AIzaSyDWMahl_BBJCNYXT2B_UDIsuw14d3UWOJ4",
          authDomain: "vngapoyo.firebaseapp.com",
          databaseURL: "https://vngapoyo-default-rtdb.firebaseio.com",
          projectId: "vngapoyo",
          storageBucket: "vngapoyo.firebasestorage.app",
          messagingSenderId: "1051199667699",
          appId: "1:1051199667699:web:926de8a6519ca70bf6a686"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Inicializar el mapa centrado en un punto base (Ej. Lima, Perú)
        const mapa = L.map('mapa').setView([-12.046374, -77.042793], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(mapa);

        // Diccionario para almacenar los marcadores y no duplicarlos
        let marcadores = {};

        // Escuchar cambios en tiempo real en la base de datos
        const flotaRef = ref(db, 'flota_activa');
        onValue(flotaRef, (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                // Iterar sobre cada vehículo en la base de datos
                Object.keys(data).forEach(placa => {
                    const vehiculo = data[placa];
                    
                    // Si el estado no es en_ruta, podríamos ocultarlo (opcional)
                    if(vehiculo.estado === 'ruta_completada' && marcadores[placa]) {
                        mapa.removeLayer(marcadores[placa]);
                        delete marcadores[placa];
                        return;
                    }

                    // Crear el contenido del Popup
                    const contenidoPopup = `
                        <div class="info-vehiculo">
                            <strong>Placa:</strong> ${vehiculo.placa} <br>
                            <strong>Conductor:</strong> ${vehiculo.conductor} <br>
                            <strong>Velocidad:</strong> ${vehiculo.velocidad_kmh} km/h
                        </div>
                    `;

                    if (marcadores[placa]) {
                        // Si el marcador ya existe, simplemente actualizar su posición
                        marcadores[placa].setLatLng([vehiculo.latitud, vehiculo.longitud]);
                        marcadores[placa].getPopup().setContent(contenidoPopup);
                    } else {
                        // Si no existe, crear un nuevo marcador personalizado con la placa
                        const iconoPersonalizado = L.divIcon({
                            className: 'etiqueta-placa',
                            html: vehiculo.placa,
                            iconSize: [60, 20]
                        });

                        const nuevoMarcador = L.marker([vehiculo.latitud, vehiculo.longitud], {icon: iconoPersonalizado})
                            .bindPopup(contenidoPopup)
                            .addTo(mapa);
                            
                        marcadores[placa] = nuevoMarcador;
                    }
                });
            }
        });
    </script>
</body>
</html>
