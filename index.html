<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERSCHEL CORP</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwZTVmZiI+PHBhdGggZD0iTTEyIDJMMCA2djYuOGMwIDUuNTUgMy44NCAxMC43NCAxMiAxMy4yaDEuMjdjMS43Ni0uNjggMy4zMy0xLjc3IDQuNi0zLjE0TDEyIDE4di00aDEwLjQ3QzIyLjI2IDExLjg3IDIyIDEwLjMyIDIyIDhWMkwxMiAyeiIvPjwvc3ZnPg==">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-base: #050505;
            --bg-panel: #0a0f1e;
            --border-neon: #00e5ff;
            --text-main: #e0f7fa;
            --text-dim: #b2ebf2;
            --card-bg: rgba(10, 25, 50, 0.6);
            --btn-focus: #00e5ff;
            --btn-focus-text: #000;
            --alert-color: #ff1744;
            --header-bg: rgba(5, 8, 20, 0.95);
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-base); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Barra de Herramientas Superior */
        #top-bar { height: 50px; background: var(--header-bg); border-bottom: 1px solid var(--border-neon); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 2000; backdrop-filter: blur(5px); }
        .titulo-top { font-size: 20px; font-weight: bold; letter-spacing: 3px; color: var(--border-neon); text-shadow: 0 0 5px rgba(0, 229, 255, 0.3); display: flex; align-items: center; gap: 15px; }
        
        /* Reloj Global */
        #reloj-global { font-family: monospace; font-size: 18px; color: #fff; background: rgba(0, 229, 255, 0.1); padding: 4px 12px; border: 1px solid var(--border-neon); border-radius: 4px; letter-spacing: 1px;}
        
        .botones-top { display: flex; gap: 15px; }
        .icon-btn { background: transparent; border: 1px solid var(--border-neon); color: var(--border-neon); border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .icon-btn:hover { background: var(--border-neon); color: var(--btn-focus-text); box-shadow: 0 0 10px var(--border-neon); }

        #contenedor-principal { display: flex; flex-grow: 1; overflow: hidden; }
        #panel-lateral { width: 350px; background-color: var(--bg-panel); border-right: 1px solid var(--border-neon); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 1000; }
        #panel-lateral.oculto { transform: translateX(-100%); position: absolute; height: 100%; }
        #mapa { flex-grow: 1; height: 100%; transition: width 0.3s ease; }

        .resumen-panel { padding: 15px; text-align: center; border-bottom: 1px solid rgba(0, 229, 255, 0.2); font-size: 12px; font-weight: bold; color: var(--text-dim); }
        #lista-unidades { overflow-y: auto; padding: 15px; flex-grow: 1; }
        
        .tarjeta-unidad { background: var(--card-bg); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 6px; padding: 15px; margin-bottom: 15px; transition: 0.3s; }
        .tarjeta-unidad:hover { border-color: var(--border-neon); }
        
        .tu-cabecera { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(128, 128, 128, 0.2); padding-bottom: 5px; }
        .tu-placa { font-size: 18px; font-weight: bold; color: var(--text-main); }
        .tu-estado { font-size: 11px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        
        .estado-ok { background-color: rgba(0, 255, 0, 0.1); color: #00c853; border: 1px solid #00c853; }
        .estado-alerta { background-color: rgba(255, 0, 0, 0.1); color: var(--alert-color); border: 1px solid var(--alert-color); animation: parpadeo 1s infinite; }

        .tu-datos { font-size: 13px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.6; }
        .hora-dato { font-family: monospace; color: #fff; background: rgba(0,0,0,0.5); padding: 2px 4px; border-radius: 3px; }
        
        /* Botones de Control Cuadrícula 2x2 */
        .tu-controles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-control { padding: 6px; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-enfocar { background-color: var(--btn-focus); color: var(--btn-focus-text); }
        .btn-enfocar:hover { filter: brightness(1.2); }
        .btn-historial { background-color: transparent; border: 1px solid #ffb300; color: #ffb300; }
        .btn-historial:hover { background-color: rgba(255, 179, 0, 0.2); }
        .btn-maps { background-color: transparent; border: 1px solid #00e676; color: #00e676; }
        .btn-maps:hover { background-color: rgba(0, 230, 118, 0.2); }
        .btn-reset { background-color: transparent; color: var(--alert-color); border: 1px solid var(--alert-color); }
        .btn-reset:hover { background-color: rgba(255, 23, 68, 0.2); }

        .marcador-vehiculo { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; }
        .icono-nave { width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); filter: drop-shadow(0 0 6px var(--border-neon)); }
        
        .leaflet-popup-content-wrapper { background: var(--header-bg); border: 1px solid var(--border-neon); color: var(--text-main); }
        .leaflet-popup-tip { background: var(--header-bg); border: 1px solid var(--border-neon); }
        .info-popup hr { border: 0; border-top: 1px solid rgba(0, 229, 255, 0.3); margin: 8px 0; }

        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .latencia-critica .icono-nave { filter: drop-shadow(0 0 10px var(--alert-color)); }
    </style>
</head>
<body>

    <header id="top-bar">
        <div class="titulo-top">
            <button class="icon-btn" onclick="toggleMenu()" title="Ocultar/Mostrar Menú">☰</button>
            HERSCHEL CORP
        </div>
        <div id="reloj-global">00:00:00</div>
        <div class="botones-top">
            <button class="icon-btn" onclick="abrirAjustes()" title="Configuración Sistema">⚙️</button>
        </div>
    </header>

    <div id="contenedor-principal">
        <aside id="panel-lateral">
            <div class="resumen-panel" id="contador-unidades">SISTEMA INICIADO</div>
            <div id="lista-unidades"></div>
        </aside>
        <main id="mapa"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove, query, limitToLast, get } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        // RECUERDA INYECTAR TUS LLAVES AQUI
        const firebaseConfig = {
            apiKey: "AIzaSyDWMahl_BBJCNYXT2B_UDIsuw14d3UWOJ4",
            authDomain: "vngapoyo.firebaseapp.com",
            databaseURL: "https://vngapoyo-default-rtdb.firebaseio.com",
            projectId: "vngapoyo",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Mapa estándar de OpenStreetMap
        const mapa = L.map('mapa', { zoomControl: false }).setView([-12.046374, -77.042793], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(mapa);
        L.control.zoom({ position: 'bottomright' }).addTo(mapa);

        let marcadores = {};
        let rutasTrazadas = {}; 
        let nodosHistorial = {}; // Almacena los puntos de información en la ruta
        let datosFlota = {};

        // Reloj Global
        setInterval(() => {
            document.getElementById('reloj-global').innerText = new Date().toLocaleTimeString('es-PE');
        }, 1000);

        onValue(ref(db, 'flota_activa'), (snapshot) => {
            datosFlota = snapshot.val() || {};
            renderizarInterfaz();
        });

        window.toggleMenu = () => {
            const panel = document.getElementById('panel-lateral');
            panel.classList.toggle('oculto');
            setTimeout(() => mapa.invalidateSize(), 300);
        };

        window.abrirAjustes = () => alert("Módulo de Configuración de Sistema.");

        window.enfocarUnidad = (placa) => {
            if(datosFlota[placa]) {
                mapa.flyTo([datosFlota[placa].latitud, datosFlota[placa].longitud], 16, { animate: true, duration: 1.2 });
                if(marcadores[placa]) marcadores[placa].openPopup();
            }
        };

        window.abrirGoogleMaps = (lat, lng) => {
            window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
        };

        window.forzarDesconexion = (placa) => {
            if(confirm(`Atención: Va a purgar la sesión de ${placa}. ¿Proceder?`)) {
                remove(ref(db, `flota_activa/${placa}`));
                limpiarHistorial(placa);
            }
        };

        function limpiarHistorial(placa) {
            if (rutasTrazadas[placa]) { mapa.removeLayer(rutasTrazadas[placa]); delete rutasTrazadas[placa]; }
            if (nodosHistorial[placa]) { nodosHistorial[placa].forEach(nodo => mapa.removeLayer(nodo)); delete nodosHistorial[placa]; }
        }

        // Algoritmo de Trazado de Ruta con Puntos de Datos
        window.toggleHistorial = async (placa) => {
            if (rutasTrazadas[placa]) {
                limpiarHistorial(placa);
                return;
            }

            const dbRef = ref(db, `flota_historial/${placa}`);
            const consulta = query(dbRef, limitToLast(50));
            
            try {
                const snapshot = await get(consulta);
                if (snapshot.exists()) {
                    const datos = snapshot.val();
                    const arregloDatos = Object.values(datos).sort((a, b) => a.ultima_actualizacion - b.ultima_actualizacion);
                    const arregloPuntos = arregloDatos.map(p => [p.latitud, p.longitud]);
                    
                    const linea = L.polyline(arregloPuntos, { color: '#ffb300', weight: 4, opacity: 0.8, dashArray: '10, 10' }).addTo(mapa);
                    mapa.fitBounds(linea.getBounds(), { padding: [50, 50] });
                    rutasTrazadas[placa] = linea;

                    // Extracción de datos cada 4 actualizaciones
                    nodosHistorial[placa] = [];
                    arregloDatos.forEach((punto, index) => {
                        if (index % 4 === 0 || index === arregloDatos.length - 1) {
                            const horaPunto = new Date(punto.ultima_actualizacion).toLocaleTimeString('es-PE');
                            const nodo = L.circleMarker([punto.latitud, punto.longitud], {
                                radius: 5, fillColor: "#00e5ff", color: "#000", weight: 1, fillOpacity: 0.9
                            }).bindPopup(`<div class="info-popup" style="text-align:center;"><strong>${horaPunto}</strong><br>Velocidad: ${punto.velocidad_kmh} km/h</div>`).addTo(mapa);
                            nodosHistorial[placa].push(nodo);
                        }
                    });
                } else {
                    alert('Operativa sin registros históricos recientes.');
                }
            } catch (error) {
                console.error("Fallo al extraer historial:", error);
            }
        };

        function renderizarInterfaz() {
            const tiempoActual = Date.now();
            const contenedorLista = document.getElementById('lista-unidades');
            contenedorLista.innerHTML = ''; 
            let unidadesActivas = 0;

            Object.keys(datosFlota).forEach(placa => {
                const vehiculo = datosFlota[placa];
                
                if (vehiculo.estado === 'ruta_completada') {
                    if (marcadores[placa]) { mapa.removeLayer(marcadores[placa]); delete marcadores[placa]; }
                    limpiarHistorial(placa);
                    return;
                }

                unidadesActivas++;
                const latenciaMs = tiempoActual - vehiculo.ultima_actualizacion;
                const latenciaCritica = latenciaMs > 180000; 
                
                // Formato de hora local para cada tarjeta
                const horaDispositivo = new Date(vehiculo.ultima_actualizacion).toLocaleTimeString('es-PE');
                let tiempoInactivo = "Transmisión Activa";
                if (latenciaCritica) tiempoInactivo = `Pérdida de señal: ${Math.floor(latenciaMs / 60000)} min`;

                const claseAlerta = latenciaCritica ? 'latencia-critica' : '';
                let colorNave = latenciaCritica ? 'var(--alert-color)' : '#000000'; // Marcador negro para resaltar en mapa claro
                const claseEstadoUi = latenciaCritica ? 'estado-alerta' : 'estado-ok';
                const textoEstadoUi = latenciaCritica ? 'CRÍTICO' : 'EN RUTA';

                const svgNave = `<svg viewBox="0 0 24 24" class="icono-nave" style="transform: rotate(${vehiculo.direccion_grados}deg);"><path d="M12 2L22 22L12 18L2 22L12 2Z" fill="${colorNave}" stroke="#ffffff" stroke-width="1"/></svg>`;
                const contenidoPopup = `<div class="info-popup"><div style="font-size:16px; font-weight:bold; text-align:center;">${vehiculo.placa}</div><hr><div>Operador: ${vehiculo.conductor}</div><div>Velocidad: ${vehiculo.velocidad_kmh} km/h</div></div>`;

                if (marcadores[placa]) {
                    marcadores[placa].setLatLng([vehiculo.latitud, vehiculo.longitud]);
                    marcadores[placa].setIcon(L.divIcon({ className: `marcador-vehiculo ${claseAlerta}`, html: svgNave, iconSize: [40, 40] }));
                    marcadores[placa].getPopup().setContent(contenidoPopup);
                } else {
                    const icono = L.divIcon({ className: `marcador-vehiculo ${claseAlerta}`, html: svgNave, iconSize: [40, 40] });
                    marcadores[placa] = L.marker([vehiculo.latitud, vehiculo.longitud], { icon: icono }).bindPopup(contenidoPopup, { closeButton: false, offset: [0, -15] }).addTo(mapa);
                }

                contenedorLista.innerHTML += `
                    <div class="tarjeta-unidad">
                        <div class="tu-cabecera">
                            <span class="tu-placa">${vehiculo.placa}</span>
                            <span class="tu-estado ${claseEstadoUi}">${textoEstadoUi}</span>
                        </div>
                        <div class="tu-datos">
                            Ope: ${vehiculo.conductor}<br>
                            Vel: ${vehiculo.velocidad_kmh} km/h<br>
                            U. Act: <span class="hora-dato">${horaDispositivo}</span><br>
                            Est: ${tiempoInactivo}
                        </div>
                        <div class="tu-controles">
                            <button class="btn-control btn-enfocar" onclick="enfocarUnidad('${vehiculo.placa}')">Foco</button>
                            <button class="btn-control btn-maps" onclick="abrirGoogleMaps(${vehiculo.latitud}, ${vehiculo.longitud})">Maps</button>
                            <button class="btn-control btn-historial" onclick="toggleHistorial('${vehiculo.placa}')">Ruta</button>
                            <button class="btn-control btn-reset" onclick="forzarDesconexion('${vehiculo.placa}')">Borrar</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('contador-unidades').innerText = `UNIDADES EN CAMPO: ${unidadesActivas}`;

            Object.keys(marcadores).forEach(placa => {
                if(!datosFlota[placa]) { mapa.removeLayer(marcadores[placa]); delete marcadores[placa]; }
            });
        }

        setInterval(renderizarInterfaz, 5000);
    </script>
</body>
</html>
